<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>老街网创 - 监督界面</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js" defer></script>
    <script src="utils.js" defer></script>
    <script src="storage.js" defer></script>
    <script src="supervise.js" defer></script>
</head>

<body class="supervise-page">
    <!-- 全局 Loading 遮罩（跨页面统一体验） -->
    <div id="globalLoadingOverlay" class="global-loading" aria-live="polite" aria-busy="true">
        <div class="global-loading__box">
            <div class="global-loading__spinner" aria-hidden="true"></div>
            <div class="global-loading__text">加载中…</div>
        </div>
    </div>
    <div class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-brand">老街网创</span>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button type="button" class="logout-btn logout-btn-mobile" onclick="logout()" title="退出登录">退出</button>
            </div>
        </div>

        <div class="nav-row">
            <div class="nav-item" onclick="window.location.href='jiaoxing.html?page=home'">
                <span class="icon"><i data-lucide="house"></i></span>
                <span>首页</span>
            </div>

            <div class="nav-item active" id="nav-taobao" onclick="toggleSubMenu()">
                <span class="icon"><i data-lucide="shopping-cart"></i></span>
                <span>淘宝<span class="supervise-text">监督</span>项目</span>
                <span class="arrow" id="arrow">▼</span>
            </div>

            <div class="sub-menu" id="subMenu" style="display:none;">
                <div class="sub-item" onclick="window.location.href='jiaoxing.html?page=wake'">叫醒</div>
                <div class="sub-item active">监督</div>
            </div>

            <div class="nav-item" onclick="window.location.href='jiaoxing.html?page=team'">
                <span class="icon"><i data-lucide="users"></i></span>
                <span id="navTeamText">团队管理</span>
            </div>

            <div class="nav-item" id="nav-notice-setting" style="display:none;"
                onclick="window.location.href='jiaoxing.html?page=noticeSetting'">
                <span class="icon"><i data-lucide="settings"></i></span>
                <span>公告设置</span>
            </div>

            <div class="nav-item logout-nav-item" onclick="logout()" title="退出登录">
                <span class="icon"><i data-lucide="log-out"></i></span>
                <span>退出登录</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="user-info">当前用户：<span id="superviseUserName">-</span></div>

        <div class="supervise-toolbar">
            <input type="text" id="superviseSearchInput" placeholder="搜索：订单号、项目、学员、监督员">
            <select id="superviseStatusFilter">
                <option value="all">全部状态</option>
                <option value="待接单">待接单</option>
                <option value="进行中">进行中</option>
                <option value="已完成">已完成</option>
            </select>
            <input type="date" id="superviseDateFilter">
            <button type="button" onclick="submitSuperviseSearch()">搜索</button>
            <button type="button" class="ghost" onclick="clearSuperviseSearch()">清空</button>
        </div>

        <div class="admin-form supervise-task-form" id="superviseTaskFormSection">
            <input type="datetime-local" id="svTaskTime">
            <input type="text" id="svOrderNo" placeholder="订单号">
            <select id="svProjectName">
                <option value="">请选择项目</option>
                <option value="监督早睡">监督早睡</option>
                <option value="监督早起">监督早起</option>
                <option value="监督早睡早起">监督早睡早起</option>
            </select>
            <select id="svDuration">
                <option value="1次">1次</option>
                <option value="7次">7次</option>
                <option value="15次">15次</option>
                <option value="30次">30次</option>
                <option value="其他时间">其他次数</option>
            </select>
            <input type="text" id="svStudentName" placeholder="学员名字">
            <input type="number" id="svPrice" placeholder="结算价格" step="0.01" min="0">
            <select id="svSupervisor">
                <option value="">请选择监督员</option>
            </select>
            <button type="button" onclick="addSingleSuperviseTask()">添加监督任务</button>
        </div>

        <div class="admin-form" id="superviseBatchSection" style="flex-direction: column;">
            <h3 class="batch-upload-title">批量添加监督任务</h3>
            <textarea id="superviseBatchText"
                placeholder="粘贴监督任务文本（示例：&#10;TB20260414001&#10;监督早睡&#10;张三&#10;7次&#10;首单测试&#10;&#10;或单行：TB20260414002 监督早起 李四 3次 复训）"></textarea>
            <div style="display: flex; flex-wrap: wrap; gap: 12px;">
                <button type="button" onclick="parseSuperviseBatchOrders()">识别任务</button>
                <button type="button" id="superviseUploadBtn" disabled onclick="uploadSuperviseOrders()">批量上传</button>
            </div>
            <div id="superviseParsePreview" class="preview-box"></div>
        </div>

        <div class="admin-buttons" id="superviseBatchActions" style="display:flex;">
            <button type="button" class="danger" onclick="deleteSelectedSupervise()">删除选中</button>
            <button type="button" onclick="editSelectedSupervise()">修改选中</button>
        </div>

        <div id="superviseLoadingIndicator" class="loading-indicator" style="display: none;">
            <div class="loading-indicator__spinner" aria-hidden="true"></div>
            <span class="loading-indicator__text">加载中...</span>
        </div>

        <div id="superviseMobileCards" class="supervise-mobile-cards" style="display:none;"></div>

        <div class="table-wrapper supervise-table-wrapper">
            <table class="supervise-table">
                <thead>
                    <tr>
                        <th>选择</th>
                        <th>订单号</th>
                        <th>项目</th>
                        <th>次数</th>
                        <th>学员名字</th>
                        <th>结算价格</th>
                        <th>监督员</th>
                        <th>备注</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="superviseTableBody">
                    <tr>
                        <td colspan="10" class="salary-empty-cell">暂无监督数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="superviseCalendarModal">
        <div class="modal-box sv-cal-modal-box">
            <div class="sv-cal-modal-scroll">
            <div class="sv-cal-panel">
                <div class="sv-cal-month-row">
                    <div id="superviseCalendarMonthLabel" class="sv-cal-month-label"></div>
                    <div class="sv-cal-month-right">
                        <div class="sv-cal-nav">
                            <button type="button" class="sv-cal-nav-btn" onclick="changeSuperviseCalendarMonth(-1)">上月</button>
                            <button type="button" class="sv-cal-nav-btn" onclick="changeSuperviseCalendarMonth(1)">下月</button>
                        </div>
                        <button type="button" class="sv-cal-close-icon" title="关闭" aria-label="关闭"
                            onclick="closeSuperviseCalendarModal()">×</button>
                    </div>
                </div>
                <div id="superviseCalendarLegend" class="sv-cal-legend">
                    <span class="sv-cal-legend__item">✅ 已完成</span>
                    <span class="sv-cal-legend__item" title="仅通过部分（如早睡早起只传了 1 张）">🔸 部分</span>
                    <span class="sv-cal-legend__item">❌ 未完成</span>
                    <span class="sv-cal-legend__item">⭕ 待传</span>
                    <span class="sv-cal-legend__item">📍 今天</span>
                </div>
            </div>
            <div class="sv-log-layout">
                <div class="sv-cal-calendar-wrap">
                    <div id="superviseCalendarGrid"></div>
                </div>
                <div class="sv-log-uploader sv-submit-card">
                    <h4 class="sv-submit-card__title">提交监督截图</h4>
                    <div id="svDailyRequirementHint" class="sv-submit-card__hint">
                        当前日期需提交：--
                    </div>
                    <div id="svComboCountHint" class="sv-submit-card__hint" style="display:none;">
                        当前次数：早睡 --/--，早起 --/--
                    </div>
                    <input type="file" id="calendarSuperviseImage" accept="image/*">
                    <details class="sv-spec-details" id="svScreenshotSpecDetails">
                        <summary class="sv-spec-summary">截图规范说明</summary>
                        <p id="svScreenshotSpecHint"
                            style="font-size:12px; color:#64748b; margin:8px 0 0; line-height:1.55;">规范说明将随本单监督项目自动切换。</p>
                    </details>
                    <img id="calendarSupervisePreview" alt="截图预览"
                        class="sv-cal-preview-img"
                        style="display:none; width:100%; max-height:220px; object-fit:contain; border-radius:8px; border:1px solid rgba(148,163,184,0.35); margin-top:8px;">
                    <div id="calendarSuperviseAiResult" class="sv-submit-card__status">上传截图后，点击
                        AI 识别并提交</div>
                    <div id="calendarSuperviseAiActionsSingle" class="modal-footer"
                        style="justify-content:flex-start; margin-top:10px;">
                        <button type="button" class="success" onclick="submitDailySuperviseWithAI()">AI识别并提交</button>
                    </div>
                    <div id="calendarSuperviseAiActionsSleepWake" class="modal-footer"
                        style="display:none; justify-content:flex-start; flex-wrap:wrap; gap:8px; margin-top:10px;">
                        <button type="button" class="sv-cal-ai-btn" id="calendarSuperviseAiBtnSleep"
                            onclick="submitDailySuperviseWithAI('监督早睡')">识别早睡</button>
                        <button type="button" class="sv-cal-ai-btn" id="calendarSuperviseAiBtnWake"
                            onclick="submitDailySuperviseWithAI('监督早起')">识别早起</button>
                    </div>
                    <div class="modal-footer" id="superviseManualActions"
                        style="display:none; justify-content:flex-start; margin-top:8px;">
                        <button type="button" class="success" onclick="markSuperviseDailyByAdmin(true)">完成</button>
                        <button type="button" class="danger" onclick="markSuperviseDailyByAdmin(false)">未完成</button>
                        <button type="button" class="success" onclick="markSuperviseSlotByAdmin('sleep')">完成监督早睡</button>
                        <button type="button" class="success" onclick="markSuperviseSlotByAdmin('wake')">完成监督早起</button>
                    </div>
                    <div class="modal-footer" id="superviseLeaveActions"
                        style="display:none; justify-content:flex-start; margin-top:8px;">
                        <button type="button" class="sv-cal-leave-btn" id="superviseLeaveBtnSleep"
                            onclick="markSuperviseLeaveForDate('sleep')">申请请假早睡</button>
                        <button type="button" class="sv-cal-leave-btn" id="superviseLeaveBtnWake"
                            onclick="markSuperviseLeaveForDate('wake')">申请请假早起</button>
                    </div>
                </div>
            </div>
            </div>
            <div class="modal-footer sv-cal-modal-footer">
                <button type="button" class="success" id="superviseTaskFinishAction" style="display:none;"
                    onclick="finishSuperviseTask(currentCalendarTaskId)">整单完成</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="customDurationModal">
        <div class="modal-box" style="max-width: 420px;">
            <h3>输入监督次数</h3>
            <div class="modal-form-item">
                <label for="customDurationDays">监督次数（单位：次）</label>
                <input type="number" id="customDurationDays" min="1" step="1" placeholder="请输入次数，例如 5">
            </div>
            <div class="modal-footer">
                <button type="button" class="ghost" onclick="closeCustomDurationModal()">取消</button>
                <button type="button" class="success" onclick="confirmCustomDuration()">确定</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="takeSuperviseModal">
        <div class="modal-box" style="max-width: 420px;">
            <h3>接单设置</h3>
            <div class="modal-form-item">
                <label for="takeSuperviseStartDate">开始监督日期</label>
                <input type="date" id="takeSuperviseStartDate">
            </div>
            <div class="modal-form-item" id="takeSuperviseStartModeWrap">
                <label for="takeSuperviseStartMode">当天监督模式（仅首日）</label>
                <select id="takeSuperviseStartMode">
                    <option value="监督早睡早起">监督早睡早起</option>
                    <option value="仅监督早睡">仅监督早睡</option>
                    <option value="仅监督早起">仅监督早起</option>
                </select>
                <div style="margin-top:6px;font-size:12px;color:#64748b;">后续日期默认按「监督早睡早起」执行，可在日志中请假早睡/请假早起。</div>
            </div>
            <div class="modal-footer">
                <button type="button" class="ghost" onclick="closeTakeSuperviseModal()">取消</button>
                <button type="button" class="success" onclick="confirmTakeSuperviseTask()">确认接单</button>
            </div>
        </div>
    </div>

    <!-- 进度详情模态框 -->
    <div class="modal-overlay" id="progressModal">
        <div class="modal-box" style="max-width: 500px;">
            <div class="modal-header"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3>进度详情</h3>
                <button type="button" class="modal-close" onclick="closeProgressModal()"
                    style="background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b;">✕</button>
            </div>
            <div id="progressModalContent">
                <!-- 动态内容将通过JavaScript填充 -->
            </div>
            <div class="modal-footer">
                <button type="button" class="ghost" onclick="closeProgressModal()">关闭</button>
            </div>
        </div>
    </div>
</body>

</html>
