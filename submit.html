<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>提交订单</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 微软雅黑
    }

    body {
      background: #f5f5f5;
      padding: 20px
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      margin: 0 auto
    }

    h2 {
      margin-bottom: 15px
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 6px
    }

    button {
      padding: 10px;
      background: #409eff;
      color: white;
      border: none;
      border-radius: 6px;
      width: 100%
    }

    #price {
      font-size: 18px;
      color: red;
      font-weight: bold
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>提交叫醒订单</h2>
    员工：<span id="name"></span>
    <input type="time" id="wakeTime" oninput="calc()">
    <input type="text" id="qq" placeholder="客户QQ">
    <input type="text" id="remark" placeholder="备注">
    本单薪资：<span id="price">0</span> 元
    <button onclick="submitOrder()">提交订单</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // ====================== 你只改这里 ======================
    const SUPABASE_URL = "https://yhscpdalrsinigamhiht.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inloc2NwZGFscnNpbmlnYW1oaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzcwNzYsImV4cCI6MjA4ODI1MzA3Nn0.dZzfWYbQZog0-FwC5S1aIoJc0yAu4fFmMHtsyLlJh44";
    // ======================================================

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = JSON.parse(localStorage.getItem("loginUser"));
    if (!user) { location.href = "login.html"; }
    document.getElementById("name").innerText = user.name;

    function calc() {
      let timeStr = document.getElementById("wakeTime").value;
      if (!timeStr) return 0;
      let [h, m] = timeStr.split(":").map(Number);
      let total = h * 60 + m;
      let price = 0;
      if (total >= 360 && total <= 390) price = 0.8
      else if (total >= 391 && total <= 420) price = 0.7
      else if (total >= 421 && total <= 480) price = 0.6
      else price = 0.5
      document.getElementById("price").innerText = price;
      return price;
    }

    async function submitOrder() {
      let wakeTime = document.getElementById("wakeTime").value;
      let qq = document.getElementById("qq").value;
      let remark = document.getElementById("remark").value;
      let price = calc();

      if (!wakeTime || !qq) {
        alert("请填写完整信息");
        return;
      }

      const { error } = await db.from("orders").insert([{
        staff_id: user.id,
        staff_name: user.name,
        wake_time: wakeTime,
        qq: qq,
        remark: remark,
        price: price
      }]);

      if (error) {
        alert("提交失败：" + error.message);
      } else {
        alert("提交成功！已同步到云端");
        location.href = "my.html";
      }
    }
  </script>
</body>

</html>
