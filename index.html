<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>老街网创</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            /* 全屏背景 */
            background-image: url("bg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 背景半透明遮罩，让登录框更清晰 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            z-index: -1;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.92);
            padding: 40px 30px;
            border-radius: 16px;
            width: 360px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .title {
            text-align: center;
            font-size: 24px;
            color: #222;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-item {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #409eff;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #338eef;
        }

        .tip {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="title">欢迎登陆</div>
        <div class="input-item">
            <input type="text" id="uid" placeholder="请输入员工账号">
        </div>
        <div class="input-item">
            <input type="password" id="pwd" placeholder="请输入密码">
        </div>
        <button class="login-btn" onclick="login()">登录系统</button>
        <div class="tip">暂不支持注册</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ======================== Supabase 配置（仅新增） ========================
        const supabaseUrl = "https://yhscpdalrsinigamhiht.supabase.co";
        const supabaseKey = "sb_publishable_tMuL4ECibUBQHkpuE4BWNg_PetrZaNV";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        // =======================================================================

        // 原有本地账号（保留，作为兜底）
        const users = [
            { id: "staff01", pwd: "123456", name: "员工1", role: "staff" },
            { id: "staff02", pwd: "123456", name: "员工2", role: "staff" },
            { id: "admin", pwd: "admin888", name: "老板", role: "admin" }
        ];

        // 改造 login 函数为异步，优先查 Supabase
        async function login() {
            let uid = document.getElementById("uid").value.trim();
            let pwd = document.getElementById("pwd").value.trim();

            if (!uid || !pwd) {
                alert("请输入账号和密码！");
                return;
            }

            let user = null;
            try {
                // 第一步：优先从 Supabase 查询
                const { data, error } = await supabaseClient
                    .from('staff_list')
                    .select('id, password, name')
                    .eq('id', uid)
                    .eq('password', pwd)
                    .single();

                if (!error && data) {
                    // Supabase 查询成功，组装用户信息
                    user = {
                        id: data.id,
                        name: data.name,
                        role: data.id === 'admin' ? 'admin' : 'staff'
                    };
                }
            } catch (e) {
                console.log("Supabase 查询失败，使用本地账号兜底：", e);
            }

            // 第二步：Supabase 无数据/失败，用本地账号兜底
            if (!user) {
                user = users.find(u => u.id === uid && u.pwd === pwd);
            }

            // 验证最终结果
            if (!user) {
                alert("账号或密码错误，请重试");
                return;
            }

            // 原有保存和跳转逻辑（完全不变）
            localStorage.setItem("loginUser", JSON.stringify(user));
            location.href = "jiaoxing.html";
        }

        // 原有兜底绑定（保留）
        document.querySelector('.login-btn').addEventListener('click', login);
    </script>
</body>

</html>
