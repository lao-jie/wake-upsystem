<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <!-- 关键：手机端视口适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>老街网创</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-box">
        <div class="title">欢迎登陆</div>
        <div class="input-item">
            <input type="text" id="uid" placeholder="请输入员工账号" autocomplete="username">
        </div>
        <div class="input-item">
            <input type="password" id="pwd" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <!-- 去掉内联 onclick，避免重复绑定 -->
        <button class="login-btn">登录系统</button>
        <div class="tip">暂不支持注册</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="login.js"></script>
</body>

</html>
