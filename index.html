<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>老街网创</title>
    <!-- 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            /* 全屏背景（不需要可删除这行） */
            background-image: url("bg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            z-index: -1;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.92);
            padding: 40px 30px;
            border-radius: 16px;
            width: 360px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .title {
            text-align: center;
            font-size: 24px;
            color: #222;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-item {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #409eff;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #338eef;
        }

        .tip {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="title">欢迎登陆</div>
        <div class="input-item">
            <input type="text" id="uid" placeholder="请输入员工账号">
        </div>
        <div class="input-item">
            <input type="password" id="pwd" placeholder="请输入密码">
        </div>
        <button class="login-btn" onclick="login()">登录系统</button>
        <div class="tip">管理员可在系统内添加员工账号</div>
    </div>

    <script>
        // ======================== 需要替换的配置 ========================
        const supabaseUrl = "https://yhscpdalrsinigamhiht.supabase.co"; // 替换成 Supabase 的 Project URL
        const supabaseKey = "sb_publishable_tMuL4ECibUBQHkpuE4BWNg_PetrZaNV"; // 替换成 Supabase 的 anon public 密钥
        // =================================================================
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 登录验证函数（对接 Supabase）
        async function login() {
            let uid = document.getElementById("uid").value.trim();
            let pwd = document.getElementById("pwd").value.trim();

            if (!uid || !pwd) {
                alert("请输入账号和密码！");
                return;
            }

            // 从 Supabase 查询员工
            const { data, error } = await supabase
                .from('staff_list')
                .select('*')
                .eq('id', uid)
                .eq('password', pwd)
                .single();

            if (error || !data) {
                alert("账号或密码错误，请重试");
                return;
            }

            // 保存登录状态
            const user = {
                id: data.id,
                name: data.name,
                role: data.id === 'admin' ? 'admin' : 'staff'
            };
            localStorage.setItem("loginUser", JSON.stringify(user));
            location.href = "jiaoxing.html";
        }
    </script>
</body>

</html>
