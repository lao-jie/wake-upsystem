<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>个人中心</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 微软雅黑
    }

    body {
      background: #f5f5f5;
      padding: 20px
    }

    .container {
      max-width: 450px;
      margin: 0 auto
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px
    }

    .total {
      font-size: 18px;
      color: red;
      font-weight: bold
    }

    .order {
      padding: 10px;
      border-bottom: 1px solid #eee
    }

    button {
      width: 100%;
      padding: 10px;
      background: #409eff;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 10px
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h2>个人中心</h2>
      员工：<span id="name"></span><br>
      总订单：<span id="orderCount">0</span><br>
      总薪资：<span id="totalWage" class="total">0</span> 元
      <button onclick="location.href='submit.html'">继续接单</button>
      <button onclick="logout()">退出登录</button>
    </div>

    <div class="card">
      <h3>我的订单</h3>
      <div id="orderList"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    // ====================== 你只改这里 ======================
    const SUPABASE_URL = "https://yhscpdalrsinigamhiht.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inloc2NwZGFscnNpbmlnYW1oaWh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzcwNzYsImV4cCI6MjA4ODI1MzA3Nn0.dZzfWYbQZog0-FwC5S1aIoJc0yAu4fFmMHtsyLlJh44";
    // ======================================================

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = JSON.parse(localStorage.getItem("loginUser"));
    if (!user) { location.href = "login.html"; }
    document.getElementById("name").innerText = user.name;

    async function loadMyData() {
      let { data: orders } = await db
        .from("orders")
        .select("*")
        .eq("staff_id", user.id);

      document.getElementById("orderCount").innerText = orders.length;
      let total = orders.reduce((s, o) => s + o.price, 0);
      document.getElementById("totalWage").innerText = total.toFixed(2);

      let html = '';
      orders.forEach(o => {
        html += `
    <div class="order">
      叫醒时间: ${o.wake_time}<br>
      QQ: ${o.qq}<br>
      备注: ${o.remark || '无'}<br>
      本单: ${o.price} 元
    </div>`;
      });
      document.getElementById("orderList").innerHTML = html;
    }

    function logout() {
      localStorage.removeItem("loginUser");
      location.href = "login.html";
    }

    loadMyData();
  </script>
</body>

</html>
